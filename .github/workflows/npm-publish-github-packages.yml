# This workflow builds and deploys your Horizon Hub PWA (with pickup truck style)
# Taken from our own collection – Horizon Hub Team

name: Horizon Hub – Pickup Truck Deploy

on:
  release:
    types: [created]
  push:
    branches: [main, truck-feature]
  workflow_dispatch:  # allow manual run

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚛 Checkout code (includes your pickup truck HTML)
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install dependencies (if any)
        run: npm ci || echo "No dependencies – pure HTML/CSS/JS truck"

      - name: 🧪 Run tests (check if pickup truck honks)
        run: |
          echo "Testing truck horn..."
          grep -q "honk" index.html && echo "✅ Horn found" || echo "⚠️ No horn but still a truck"

      - name: 📱 Generate PWA icons (pickup truck style)
        run: |
          # In a real setup you'd use a tool like sharp
          echo "🚚 Generating truck icons from template..."
          # Placeholder – replace with actual icon generation
          mkdir -p icons
          echo "Truck icon ready" > icons/truck-192.png

      - name: 🚀 Deploy to GitHub Pages / your server
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          user_name: "Horizon Truck Bot"
          user_email: "truck@horizonhub.com"
          commit_message: "🚛 Deploy pickup truck release ${{ github.ref_name }}"

      - name: 📢 Post deployment honk
        run: echo "HONK HONK! Your pickup truck is live."
